id: "zip_array_property"
name: "zip_array"
logicalType: "array"
logicalTypeOptions:
  maxItems: 3
  uniqueItems: true
items:
  properties:
    - id: "id_property"
      name: "id"
      logicalType: "string"
      logicalTypeOptions:
        format: "uuid"
        pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
      physicalType: "VARCHAR(36)"
    - id: "zip_property"
      name: "zip"
      logicalType: "string"
      logicalTypeOptions:
        format: "zip"
        pattern: '^\d{5}-\d{3}$'
      physicalType: "VARCHAR(15)"
    - id: "order_property"
      name: "order"
      logicalType: "integer"
      logicalTypeOptions:
        maximum: 256
        minimum: 0
      physicalType: "SMALLINT"